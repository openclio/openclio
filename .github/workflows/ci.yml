name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tools
        run: |
          set -e
          go install golang.org/x/tools/cmd/goimports@latest || true

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)" || (echo 'gofmt differences found' && exit 1)

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

      - name: Run short lints (optional)
        run: |
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./...
          else
            echo "golangci-lint not installed; skipping"
          fi

  coverage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Run coverage
        run: |
          go test ./... -coverprofile=coverage.out || true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -race -timeout 120s -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Integration tests
        run: go test -race -tags=integration -timeout 120s ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
        continue-on-error: true

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Vulnerability scan (govulncheck)
        run: govulncheck ./...
        continue-on-error: true

      - name: Static analysis (gosec)
        run: gosec -quiet ./...
        continue-on-error: true

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true

      - name: Build
        run: go build -o /dev/null ./cmd/agent


  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests before release
        run: |
          go test -race -timeout 120s ./...
          go test -race -tags=integration -timeout 120s ./...

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME} -s -w"

          declare -A PLATFORMS
          PLATFORMS=(
            ["linux/amd64"]="agent-linux-amd64"
            ["linux/arm64"]="agent-linux-arm64"
            ["darwin/amd64"]="agent-darwin-amd64"
            ["darwin/arm64"]="agent-darwin-arm64"
            ["windows/amd64"]="agent-windows-amd64.exe"
          )

          mkdir -p dist
          for platform in "${!PLATFORMS[@]}"; do
            GOOS=${platform%/*}
            GOARCH=${platform##*/}
            output="dist/${PLATFORMS[$platform]}"
            echo "Building ${output}..."
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -ldflags "${LDFLAGS}" \
              -o "${output}" \
              ./cmd/agent
          done

          # Generate checksums
          cd dist && sha256sum * > checksums.txt

      - name: Generate SBOM
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod app -output dist/sbom.json -json -assert-licenses
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Or download the binary for your platform from the assets below.
