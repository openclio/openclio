name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            extension: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download modules
        env:
          GONOSUMDB: "go.mau.fi,go.mau.fi/*"
          GOPROXY: "https://proxy.golang.org,direct"
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GONOSUMDB: "go.mau.fi,go.mau.fi/*"
          GOPROXY: "https://proxy.golang.org,direct"
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF}" ]; then
            VERSION="dev"
          fi
          BINARY="openclio-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}"
          mkdir -p dist

          go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.commit=${GITHUB_SHA:0:7}" \
            -o "dist/${BINARY}" \
            ./cmd/openclio

          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BINARY}.zip" "${BINARY}"
            echo "ASSET=${BINARY}.zip" >> $GITHUB_ENV
          else
            tar -czf "${BINARY}.tar.gz" "${BINARY}"
            echo "ASSET=${BINARY}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: false

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.distribution
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            openclio/openclio:${{ github.ref_name }}
            openclio/openclio:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
