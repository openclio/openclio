#     env:
#       GITHUB_TOKEN: GITHUB_TOKEN   # env var name

# ── CLI (interactive terminal) ────────────────────────────────────────────────
cli:
  scanner_buffer: 65536          # 64 KB line scanner buffer

# ── Channel Adapters ──────────────────────────────────────────────────────────
channels:
  allow_all: true

  # telegram:
  #   token_env: TELEGRAM_BOT_TOKEN

  # discord:
  #   token_env: DISCORD_BOT_TOKEN
  #   app_id_env: DISCORD_APP_ID

  # whatsapp:
  #   enabled: false
  #   # data_dir: ~/.openclio
  #   # Uses QR login via WhatsApp Linked Devices.
  #   # token_env / webhook_url are reserved for a future Cloud API mode and are ignored today.

# ── Scheduled Tasks (Cron) ────────────────────────────────────────────────────
# cron:
#   - name: daily-summary
#     schedule: "0 9 * * *"
#     # trigger: "every 6 hours"   # optional event-driven watch trigger (use schedule OR trigger)
#     prompt: "Give me a brief summary of what I should focus on today."
#     channel: telegram
#     session_mode: isolated      # isolated | shared (default: isolated)

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:  info
  output: stderr
